<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Links</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page-shell">
      <section class="card-panel">
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="/about">About</a>
        </nav>

        <header class="hero">
          <p class="eyebrow">Link in bio</p>
          <h1>My Links</h1>
          <p class="subtitle">A simple collection of favorite places, projects, and resources.</p>
        </header>

        <form class="link-form" action="/add" method="post">
          <div class="form-field">
            <label for="site_name">Site Name</label>
            <input type="text" id="site_name" name="site_name" placeholder="OpenAI" required>
          </div>

          <div class="form-field">
            <label for="url">URL</label>
            <input type="url" id="url" name="url" placeholder="https://example.com" required>
          </div>

          <button type="submit">Add Link</button>
        </form>

        <ul class="link-list">
          {% for link in links %}
          <li class="link-card">
            <div class="link-main">
              <a class="link-name" href="{{ link.url }}">{{ link.site_name }}</a>
              <div class="metadata-grid" aria-label="Open Graph details for {{ link.site_name }}">
                <div class="metadata-column">
                  <span class="metadata-label">Title</span>
                  <span class="metadata-value">{{ link.title }}</span>
                </div>
                <div class="metadata-column">
                  <span class="metadata-label">Description</span>
                  <span class="metadata-value">{{ link.description }}</span>
                </div>
                <div class="metadata-column">
                  <span class="metadata-label">Image URL</span>
                  <span class="metadata-value">{{ link.image_url }}</span>
                </div>
              </div>
            </div>
            <div class="link-actions">
              <a class="edit-button" href="{{ url_for('edit_link', link_index=loop.index0) }}" aria-label="Edit {{ link.site_name }}">Edit</a>
              <form action="{{ url_for('delete_link', link_index=loop.index0) }}" method="post">
                <button class="delete-button" type="submit" aria-label="Delete {{ link.site_name }}">Delete</button>
              </form>
            </div>
          </li>
          {% endfor %}
        </ul>
      </section>
    </main>
  </body>
</html>
