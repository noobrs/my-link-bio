<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit {{ link.site_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page-shell">
      <section class="card-panel">
        <a class="back-link" href="{{ url_for('index') }}">← Back to links</a>
        <header class="hero">
          <p class="eyebrow">Edit link</p>
          <h1>Edit {{ link.site_name }}</h1>
          <p class="subtitle">Update the display name and destination URL for this link card.</p>
        </header>

        <form class="link-form" action="{{ url_for('edit_link', link_index=link_index) }}" method="post">
          <div class="form-field">
            <label for="site_name">Site Name</label>
            <input type="text" id="site_name" name="site_name" value="{{ link.site_name }}" required>
          </div>

          <div class="form-field">
            <label for="url">URL</label>
            <input type="url" id="url" name="url" value="{{ link.url }}" required>
          </div>

          <button type="submit">Save Changes</button>
        </form>
      </section>
    </main>
  </body>
</html>
